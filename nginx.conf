events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Cache static assets
  proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=STATIC:10m inactive=7d use_temp_path=off;

  resolver 127.0.0.11 valid=30s;

  # 1. HTTP Redirect (Port 80 -> 443)
  server {
    listen 80;
    server_name tool.cloud-ip.cc *.tool.cloud-ip.cc;
    server_tokens off;

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # 2. Wildcard Subdomain Handler (Production Builds via HTTPS)
  server {
    listen 443 ssl;
    server_name ~^(?<clientslug>.+)\.tool\.cloud-ip\.cc$;
    server_tokens off;

    # Shared Wildcard Certificate
    ssl_certificate /etc/letsencrypt/live/tool.cloud-ip.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tool.cloud-ip.cc/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html/builds/$clientslug/out;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
    }

    # Support for internal assets
    location /_next/static {
      alias /usr/share/nginx/html/builds/$clientslug/out/_next/static;
      expires 365d;
      access_log off;
    }
  }

  # 3. HTTPS Server (Port 443) - Main Dashboard
  server {
    listen 443 ssl;
    server_name tool.cloud-ip.cc;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/tool.cloud-ip.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tool.cloud-ip.cc/privkey.pem;

    # SSL optimizations
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    gzip on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Main Application
    location / {
      proxy_pass http://app:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    # Static Assets Cache
    location /_next/static {
      proxy_cache STATIC;
      proxy_pass http://app:3000;
    }

    location /static {
      proxy_cache STATIC;
      proxy_ignore_headers Cache-Control;
      proxy_cache_valid 60m;
      proxy_pass http://app:3000;
    }

    # Route-based Preview Pool (e.g., /preview/3001/ -> app:3001/preview/3001/)
    location ~ ^/preview/(300[1-9]|3010) {
      proxy_pass http://app:$1$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;

      # Race condition mitigation: retry if upstream is not ready
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_connect_timeout 5s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
    }
  }
}
